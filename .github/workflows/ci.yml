name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Enable Corepack (to use pnpm)
        run: corepack enable

      - name: Install pnpm (just in case)
        run: corepack prepare pnpm@8.15.4 --activate

      - name: Debug pnpm path
        run: |
          echo "PNPM version:"
          pnpm --version
          which pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test
