name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize ]

jobs:
  install:
    name: Install dependencies
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
  build:
    name: Build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Build
        run: pnpm build
  test:
    name: Test
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test
        run: pnpm test