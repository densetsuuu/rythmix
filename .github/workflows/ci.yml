name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install_dependencies:
    runs-on: ubuntu-latest
    outputs:
      turborepo-cache: ${{ steps.cache.outputs.cache-hit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies with pnpm
        run: pnpm install

      - name: Cache pnpm dependencies
        id: cache
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo build cache
        uses: actions/cache@v3
        with:
          path: ~/.turbo
          key: ${{ runner.os }}-turborepo-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-

  setup_database:
    runs-on: ubuntu-latest
    needs: install_dependencies

    services:
      postgres:
        image: postgres:13
        options: --health-cmd="pg_isready -U postgres" --health-timeout=5s --health-retries=5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432

    steps:
      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

  run_tests:
    runs-on: ubuntu-latest
    needs: [ install_dependencies, setup_database ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm  # Installer pnpm ici également pour être sûr qu'il est disponible

      - name: Install dependencies with pnpm
        run: pnpm install

      - name: Use Turborepo cache for builds and tests
        run: pnpm turbo run test  # Pas besoin de spécifier --cache

      - name: Run tests
        run: pnpm test
